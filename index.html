<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>YAML Collector</title>
    <meta
      name="description"
      content="Cookie-bound Archipelago YAML room collection for GitHub Pages."
    >
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Space+Grotesk:wght@400;500;700&display=swap"
      rel="stylesheet"
    >
    <link rel="icon" type="image/png" href="./favicon.png">
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <div class="page-shell">
      <header class="topbar">
        <h1>YAML Collector</h1>
      </header>

      <div class="app-shell">
        <aside class="sidebar">
          <nav class="sidebar-nav" aria-label="Primary">
            <button class="nav-link" type="button" data-route="rooms">My Rooms</button>
            <button class="nav-link" type="button" data-route="create">Create Room</button>
            <button class="nav-link" type="button" data-route="profile">Profile</button>
            <button class="nav-link" type="button" data-route="about">About</button>
          </nav>
        </aside>

        <main class="main-panel">
          <div id="status-banner" class="banner hidden"></div>
          <section id="main-view" class="main-view"></section>
        </main>
      </div>
    </div>

    <input id="upload-input" type="file" accept=".yaml,.yml,.txt,text/plain" multiple hidden>

    <div id="modal-root" class="modal-root hidden" aria-hidden="true">
      <div id="modal-backdrop" class="modal-backdrop"></div>
      <div class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="modal-title">
        <div class="modal-head">
          <h2 id="modal-title">Dialog</h2>
          <button id="modal-close" type="button" class="icon-button" aria-label="Close dialog">×</button>
        </div>
        <div id="modal-body" class="modal-body"></div>
      </div>
    </div>

    <script src="./config.js"></script>
    <script src="./app.js" defer></script>
  </body>
</html>
